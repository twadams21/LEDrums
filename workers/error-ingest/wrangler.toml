# Cloudflare Worker: LEDrums error-report ingest (#122). Deployed MANUALLY via wrangler — see
# README.md. Secrets (TELEMETRY_TOKEN, DISCORD_WEBHOOK_URL) are set with `wrangler secret put`, never
# committed. Replace `database_id` with the real D1 id printed by `wrangler d1 create`.
name = "ledrums-error-ingest"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "ledrums-errors"
database_id = "066f4464-0cf5-40c1-ba6e-6bb328df7bb2"

# Project backups (#123): snapshot bundles stored under `backups/<machine>/<timestamp>-<reason>`.
# Remote retention is a bucket LIFECYCLE RULE (90-day expiry), set on the bucket — not code. Create
# the bucket + rule once: see README ("Project backups"). No database_id equivalent for R2.
[[r2_buckets]]
binding = "BACKUPS"
bucket_name = "ledrums-backups"
